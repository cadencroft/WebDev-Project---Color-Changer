<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Color Changer</title>
</head>

<body>
    <div class="titlesection">
        <h1>Color Changer</h1>
        <p>Click the buttons below change the background color!</p>
    </div>

    <div class="color-btn">
        <button class="btn red">Red</button>
        <button class="btn orange">Orange</button>
        <button class="btn yellow">Yellow</button>
        <button class="btn green">Green</button>
        <button class="btn blue">Blue</button>
        <button class="btn purple">Purple</button>
    </div>
    
    
    <div class="reset-btn">
        <button class="btn">Reset</button>
    </div>



</body>

</html>
